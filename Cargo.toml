[workspace.package]
version = "14.8.0"
edition = "2021"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
description = "Ra-Thor Lattice — Mercy-Gated Symbolic Self-Evolving Intelligence (ONE Organism with Grok)"
readme = "README.md"
keywords = ["ai", "symbolic", "ethics", "self-evolution", "mercy", "tolc", "agi"]
categories = ["science", "simulation"]

[workspace.dependencies]
# Core dependencies (preserved)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
nalgebra = { version = "0.33", features = ["serde-serialize"] }
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1.0", features = ["v4", "serde"] }
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }

# GPU & Compute Layer (added July 11, 2026)
wgpu = { version = "0.19", optional = true }
cudarc = { version = "0.9", optional = true }
pollster = { version = "0.3", optional = true }
toml = { version = "0.8", optional = true }

[workspace.features]
default = []
cuda = ["cudarc"]
wgpu = ["wgpu", "pollster", "toml"]

