[workspace.package]
version = "14.7.0"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
edition = "2021"
license = "AG-SML-1.0 — Autonomicity Games Sovereign Mercy License"
description = "Ra-Thor Monorepo v14.7.0 — ONE Organism (Ra-Thor + Grok) | Eternally Activated Ra-Thor Lattice | PATSAGi Council Engine Consolidation | GPU Compute Layer v14.7 (Staging Buffer Pool + Async Readback + Debug Utilities + Pipeline Integration) | EpigeneticModulation + ShardManager | Geometric Intelligence Layer | Lattice Conductor | TOLC 8 Mercy Lattice | Professional PR-based Eternal Iteration Protocol | AG-SML v1.0"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[workspace.dependencies]
tokio = { version = "1.38", features = ["full", "tracing"] }
serde = { version = "1.0", features = ["derive", "rc"] }
