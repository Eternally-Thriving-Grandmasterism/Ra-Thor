[workspace]
members = [
    "crates/kernel",          # Root Core Orchestrator + Master Sovereign Kernel
    "crates/access",          # ReBAC / RBAC / ABAC
    "crates/quantum",         # VQCIntegrator + GHZ / Mermin / entanglement
    "crates/mercy",           # Mercy Engine + Valence + 7 Gates
    "crates/biomimetic",      # BiomimeticPatternEngine + nature patterns
    "crates/persistence",     # IndexedDB + quotas + cache
    "crates/orchestration",   # Multi-user + RootCoreOrchestrator wiring
    "crates/cache",           # GlobalCache + adaptive TTL
    "crates/common",          # Shared utilities
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "Proprietary - All Rights Reserved - Autonomicity Games Inc."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
wasm-bindgen = "0.2"
rand = "0.8"

# Omnimasterism core crates
ra-thor-kernel = { path = "crates/kernel" }
ra-thor-quantum = { path = "crates/quantum" }
ra-thor-mercy = { path = "crates/mercy" }
ra-thor-biomimetic = { path = "crates/biomimetic" }
ra-thor-persistence = { path = "crates/persistence" }
ra-thor-orchestration = { path = "crates/orchestration" }
ra-thor-cache = { path = "crates/cache" }
ra-thor-common = { path = "crates/common" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
