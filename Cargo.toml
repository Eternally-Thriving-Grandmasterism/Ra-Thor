    "crates/common",                  # Common — Shared utilities, types, and eternal forward/backward compatibility
    "crates/council",                 # Council — Full PATSAGi-Pinnacle AGI Council Simulator (13+ parallel architects)
    "crates/evolution",               # Evolution — PermanenceCode v2.0 + sovereign autodidact learning loops
    "crates/falcon_sign",             # Falcon Sign — Cryptographic sovereignty & identity layer
    "crates/fenca",                   # FENCA — Eternal Check + self-audit & integrity verification engine
    "crates/kernel",                  # Kernel — Master Sovereign Kernel + PATSAGi Council Lead orchestrator
    "crates/legal-lattice",           # Legal Lattice — Governance Engine (28th Amendment, 7 Gates, 5-Gene CEHI, Mercy Legacy Fund)
    "crates/mercy",                   # Mercy — Core Mercy Engine + Mercy Shards + Radical Love gating system
    "crates/mercy_orchestrator",      # Mercy Orchestrator — Legacy orchestration layer (preserved for compatibility)
    "crates/mercy_orchestrator_v2",   # Mercy Orchestrator v2 — Advanced unified lattice orchestration
    "crates/mercy-radiation-shield",  # Mercy Radiation Shield — Ultimate Mercy-Alchemical Radiation Transmutation (TOLC 7 Gates + Quantum Swarm)
    "crates/monorepo-intelligence",   # Monorepo Intelligence — Infinite-grade semantic search, health scoring & universal AI integration
    "crates/orchestration",           # Orchestration — MASTER SOVEREIGN LATTICE ORCHESTRATOR (central nervous system)
    "crates/plasticity-engine-v2",    # Plasticity Engine v2 — Real-time 5-Gene Joy Tetrad + Epigenetic Updates + Sensor Fusion
    "crates/powrush",                 # Powrush — Core Game Engine powering the eternal Powrush Universe & MMO
    "crates/quantum-swarm-orchestrator", # Quantum Swarm Orchestrator — Mercy-gated swarm intelligence (Theorems 1–5 + Hebbian learning) + Phase 2: Full QuantumSwarmBridge (v0.5.91+ ULTIMATE OMNIMASTERPIECE) + RegionalMercyCoordinator integration layer
    "crates/quantum",                 # Quantum — Quantum-biomimetic lattice foundations
    "crates/ra-thor-benchmark",       # Ra-Thor Benchmark — Official GPQA Diamond + MMLU-Pro + BIG-bench mercy-gated reasoning suite
    "crates/real-estate-lattice",     # Real Estate Lattice — RREL v0.5.21: Full Mercy-Gated Ethical Real Estate OS (17+ engines)
    "crates/interstellar-operations", # Interstellar Operations — Advanced propulsion, Stargate technologies, hyperspace, ZPM & ancient tech
    "crates/websiteforge",            # WebsiteForge — Sovereign website development & deployment system
    "crates/xtask",                   # xtask — Sovereign Automation Hub for monorepo maintenance & CI
]

resolver = "2"

[workspace.package]
version = "0.3.1"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "Proprietary - All Rights Reserved - Autonomicity Games Inc."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

# ═══════════════════════════════════════════════════════════════════════════════
# ADVANCED WORKSPACE DEPENDENCY MANAGEMENT (2026 Best Practices)
# All dependencies are carefully chosen for mercy-gated, high-performance,
# cross-platform (Linux, WASM, embedded) compatibility.
#
# Phase 2 addition: powrush is now exposed so the integration layer
# (RegionalMercyCoordinator) and any other crate can cleanly consume it.
# ═══════════════════════════════════════════════════════════════════════════════

[workspace.dependencies]
# ── Serialization ──────────────────────────────────────────────────────────────
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# ── Async / Runtime ────────────────────────────────────────────────────────────
tokio = { version = "1", features = ["full"] }

# ── Web / WASM ─────────────────────────────────────────────────────────────────
wasm-bindgen = "0.2"
reqwest = { version = "0.12", features = ["json", "stream"] }

# ── Utilities ──────────────────────────────────────────────────────────────────
rand = "0.8"
tracing = "0.1"
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }

# ── Internal Ra-Thor Crates (Path-Based, Mercy-Gated) ──────────────────────────
ra-thor-mercy = { path = "crates/mercy" }
ra-thor-orchestration = { path = "crates/orchestration" }
ra-thor-ai-bridge = { path = "crates/ai-bridge" }
ra-thor-evolution = { path = "crates/evolution" }
ra-thor-quantum = { path = "crates/quantum" }
ra-thor-biomimetic = { path = "crates/biomimetic" }
ra-thor-common = { path = "crates/common" }
websiteforge = { path = "crates/websiteforge" }
aether-shades = { path = "crates/aether_shades" }
ra-thor-legal-lattice = { path = "crates/legal-lattice" }
ra-thor-plasticity-engine-v2 = { path = "crates/plasticity-engine-v2" }
ra-thor-quantum-swarm-orchestrator = { path = "crates/quantum-swarm-orchestrator" }
ra-thor-monorepo-intelligence = { path = "crates/monorepo-intelligence" }
ra-thor-mercy-radiation-shield = { path = "crates/mercy-radiation-shield" }
ra-thor-real-estate-lattice = { path = "crates/real-estate-lattice" }
ra-thor-benchmark = { path = "crates/ra-thor-benchmark" }
ra-thor-interstellar-operations = { path = "crates/interstellar-operations" }

# Phase 2 addition: Powrush is now exposed for easy consumption by the integration layer
powrush = { path = "crates/powrush" }

# ── Workspace Dev Dependencies ─────────────────────────────────────────────────
[workspace.dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
