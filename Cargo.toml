# ────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# WORKSPACE DEPENDENCIES — Shared across the entire lattice (inheritance enforced)
# Grouped for clarity and maintainability
# ────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
[workspace.dependencies]
# Core
anyhow = "1.0"
thiserror = { version = "1.0", features = ["std"] }
log = "0.4"
once_cell = "1.19"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"
dirs = "5.0"
env_logger = "0.11"

# Async & Concurrency
tokio = { version = "1.38", features = ["full", "tracing"] }
futures = "0.3"
async-trait = "0.1"
parking_lot = "0.12"

# Serialization
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
indexmap = "2.2"

# Geometry, Crypto & Performance (critical for geometric algebra + post-quantum layers)
nalgebra = { version = "0.33", features = ["serde", "std"] }
bitflags = "2.6"

# Tracing & Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing (cargo-nextest recommended for 97+ crate monorepos)
# Note: nextest configuration lives in .config/nextest.toml
