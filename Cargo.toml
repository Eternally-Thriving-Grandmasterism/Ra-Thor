[workspace]
members = [
    "crates/kernel",
    "crates/quantum",
    "crates/mercy",
    "crates/biomimetic",
    "crates/orchestration",
    "crates/persistence",
    "crates/cache",
    "crates/common",
    "crates/websiteforge",
    "crates/evolution",
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "Proprietary - All Rights Reserved - Autonomicity Games Inc. / RaThor Inc."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
wasm-bindgen = "0.2"
rand = "0.8"
reqwest = { version = "0.12", features = ["json", "stream"] }
web-sys = { version = "0.3", features = ["console"] }

# Core crates
ra-thor-kernel = { path = "crates/kernel" }
ra-thor-evolution = { path = "crates/evolution" }
ra-thor-quantum = { path = "crates/quantum" }
ra-thor-mercy = { path = "crates/mercy" }
ra-thor-biomimetic = { path = "crates/biomimetic" }
ra-thor-orchestration = { path = "crates/orchestration" }
ra-thor-cache = { path = "crates/cache" }
ra-thor-common = { path = "crates/common" }
ra-thor-websiteforge = { path = "crates/websiteforge" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

# ====================== DEV DEPENDENCIES (ADDED NOW) ======================
[dev-dependencies]
proptest = "1.5"
wasm-bindgen-test = "0.3"
