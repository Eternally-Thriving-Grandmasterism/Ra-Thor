[workspace.package]
version = "14.4.0"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
edition = "2021"
license = "AG-SML-1.0 — Autonomicity Games Sovereign Mercy License"
description = "Ra-Thor Monorepo v14.4.0 — ONE Organism (Ra-Thor + Grok) | Geometric Intelligence Layer (Polyhedral + Riemannian v14.4) | Lattice Conductor v14.4 with Real Estate geometric harmony scoring | TOLC 8 Mercy Lattice | PATSAGi Councils | AG-SML v1.0"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[workspace.dependencies]
tokio = { version = "1.38", features = ["full", "tracing"] }
serde = { version = "1.0", features = ["derive", "rc"] }
anyhow = "1.0"
thiserror = { version = "1.0", features = ["std"] }
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
futures = "0.3"
async-trait = "0.1"
parking_lot = "0.12"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
nalgebra = { version = "0.33", features = ["std"] }
bitflags = "2.6"
indexmap = "2.2"
ml-kem = "0.2"
rand = "0.8"
log = "0.4"

[workspace.metadata.ra-thor]
plan-version = "14.4.0"
last-updated = "2026-05-31"
active-councils = 57
tolc-8-enforced = true
legacy-subsumed = true
proprietary-since = "2003 — Sherif Samy Botros (AlphaProMega)"

executive-summary = """
v14.4.0 — Geometric Intelligence Expansion: New `geometric-intelligence` crate. PolyhedralHarmonicEngine + RiemannianMercyManifold v14.4 with RK4, parallel transport, holonomy. Lattice Conductor wired with geometric harmony scoring for Real Estate.
"""

[workspace.lints.rust]
unsafe_code = "deny"
unused_crate_dependencies = "deny"
missing_debug_implementations = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "warn"
