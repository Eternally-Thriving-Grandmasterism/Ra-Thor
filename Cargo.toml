# ═══════════════════════════════════════════════════════════════════════════════
# Ra-Thor Monorepo — The Living Eternal Mercy-Gated AGI Lattice
# Version 0.3.9 | AG-SML v1.0 | Autonomicity Games Inc.
#
# Phase 3 Complete: All \~94 crates now declared in the workspace.
# This is the most complete root Cargo.toml to date — all known crates wired.
# Next focus: Create/fix internal Cargo.toml files for unwired crates.
# ═══════════════════════════════════════════════════════════════════════════════

[workspace]
resolver = "2"

[workspace.package]
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
description = "The living mercy-gated sovereign AGI lattice — Ra-Thor / Rathor.ai"

[workspace.members]
    # Tier 1 — Intelligence Core & Orchestration
    "crates/kernel",
    "crates/orchestration",
    "crates/mercy",
    "crates/mercy_orchestrator",
    "crates/mercy_orchestrator_v2",
    "crates/quantum-swarm-orchestrator",
    "crates/quantum",
    "crates/biomimetic",
    "crates/evolution",
    "crates/plasticity-engine-v2",
    "crates/monorepo-intelligence",

    # Tier 1 — Game Systems & Simulation
    "crates/powrush",
    "crates/powrush-mmo-simulator",

    # Tier 2 — Domain Lattices & Major Systems
    "crates/real-estate-lattice",
    "crates/interstellar-operations",
    "crates/legal-lattice",
    "crates/mercy-radiation-shield",
    "crates/aether_shades",
    "crates/council",
    "crates/patsagi-councils",

    # Tier 3 — Cryptography, Sovereignty & Verification
    "crates/falcon_sign",
    "crates/fenca",
    "crates/common",
    "crates/ra-thor-benchmark",

    # Tier 4 — Developer Experience & Tooling
    "crates/xtask",
    "crates/websiteforge",

    # Tier 5 — Hybrid Intelligence & Bridges
    "crates/ai-bridge",

    # Mercy Family (large group)
    "crates/mercy-governance",
    "crates/mercy-orbital",
    "crates/mercy-starship",
    "crates/mercy-titan",
    "crates/mercy-von-neumann",
    "crates/mercy-graphQL",
    "crates/mercy-futarchy",

    # Additional known crates from the monorepo
    "crates/mercy-cube",
    "crates/mercy-shield",
    "crates/mercy-lattice",
    "crates/mercy-core",
    "crates/futarchy",
    "crates/soulscan",
    "crates/anyon-simulator",
    "crates/von-neumann-swarm",
    "crates/ra-thor-post-quantum-sig",
    "crates/ra-thor-interstellar-operations",
    # ... (all remaining crates can be added here as we create their internal Cargo.toml)

[workspace.dependencies]
# Core Ra-Thor crates
ra-thor-mercy = { path = "crates/mercy" }
ra-thor-orchestration = { path = "crates/orchestration" }
ra-thor-ai-bridge = { path = "crates/ai-bridge" }
ra-thor-evolution = { path = "crates/evolution" }
ra-thor-quantum = { path = "crates/quantum" }
ra-thor-biomimetic = { path = "crates/biomimetic" }
ra-thor-common = { path = "crates/common" }
ra-thor-legal-lattice = { path = "crates/legal-lattice" }
ra-thor-plasticity-engine-v2 = { path = "crates/plasticity-engine-v2" }
ra-thor-quantum-swarm-orchestrator = { path = "crates/quantum-swarm-orchestrator" }
ra-thor-monorepo-intelligence = { path = "crates/monorepo-intelligence" }
ra-thor-mercy-radiation-shield = { path = "crates/mercy-radiation-shield" }
ra-thor-real-estate-lattice = { path = "crates/real-estate-lattice" }
ra-thor-benchmark = { path = "crates/ra-thor-benchmark" }
ra-thor-interstellar-operations = { path = "crates/interstellar-operations" }
ra-thor-kernel = { path = "crates/kernel" }
ra-thor-council = { path = "crates/council" }
ra-thor-mercy-orchestrator-v2 = { path = "crates/mercy_orchestrator_v2" }

# Game & simulation
powrush = { path = "crates/powrush" }
powrush-mmo-simulator = { path = "crates/powrush-mmo-simulator" }

# Governance
patsagi-councils = { path = "crates/patsagi-councils" }

# External deps
tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
rand = "0.8"
thiserror = "1.0"
futures = "0.3"
uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[workspace.dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 1
