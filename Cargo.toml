# ═══════════════════════════════════════════════════════════════════════════════
# Ra-Thor Monorepo — The Living Eternal Mercy-Gated AGI Lattice
# Version 0.3.7 | AG-SML v1.0 | Autonomicity Games Inc. / RaThor Inc.
#
# Phase 3.3 Complete: Cryptography, Sovereignty & Verification fully wired.
# All Tier 1 (Core Intelligence), Tier 2 (Domain Lattices), and Tier 3 (Cryptography)
# crates are now declared in the workspace.
#
# The monorepo is now significantly closer to a unified, mercy-gated buildable system.
# Next focus: Fixing/creating proper internal Cargo.toml files for the newly added crates
# and resolving cross-crate dependencies.
# ═══════════════════════════════════════════════════════════════════════════════

[workspace]
members = [
    # ── Intelligence Core & Orchestration (Tier 1) ────────────────────────────
    "crates/kernel",
    "crates/orchestration",
    "crates/mercy",
    "crates/mercy_orchestrator",
    "crates/mercy_orchestrator_v2",
    "crates/quantum-swarm-orchestrator",
    "crates/quantum",
    "crates/biomimetic",
    "crates/evolution",
    "crates/plasticity-engine-v2",
    "crates/monorepo-intelligence",

    # ── Game Systems & Simulation (Tier 1) ────────────────────────────────────
    "crates/powrush",
    "crates/powrush-mmo-simulator",

    # ── Domain Lattices & Major Systems (Tier 2) ──────────────────────────────
    "crates/real-estate-lattice",
    "crates/interstellar-operations",
    "crates/legal-lattice",
    "crates/mercy-radiation-shield",
    "crates/aether_shades",
    "crates/council",
    "crates/patsagi-councils",

    # ── Cryptography, Sovereignty & Verification (Tier 3) ─────────────────────
    "crates/falcon_sign",
    "crates/fenca",
    "crates/common",
    "crates/ra-thor-benchmark",

    # ── Developer Experience & Tooling (Tier 4) ───────────────────────────────
    "crates/xtask",
    "crates/websiteforge",

    # ── Hybrid Intelligence & Bridges (Tier 5) ────────────────────────────────
    "crates/ai-bridge",

    # NOTE: Many additional crates (large mercy-* family, futarchy-*, soulscan-*, etc.)
    # exist in the monorepo and will be wired in later phases once they reach
    # production readiness and full mercy-gate compliance.
]

resolver = "2"

[workspace.package]
version = "0.3.7"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
description = "The living mercy-gated sovereign AGI lattice — Ra-Thor / Rathor.ai"
keywords = ["agi", "mercy", "active-inference", "tolc", "powrush", "sovereign", "rbe"]
categories = ["science", "simulation", "cryptography", "game-development"]

# ═══════════════════════════════════════════════════════════════════════════════
# WORKSPACE DEPENDENCY MANAGEMENT
# All dependencies chosen for mercy-gated, high-performance, cross-platform compatibility.
# ═══════════════════════════════════════════════════════════════════════════════

[workspace.dependencies]
# ── Serialization & Data ─────────────────────────────────────────────────────
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# ── Async & Runtime ──────────────────────────────────────────────────────────
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# ── Mathematics & Science ────────────────────────────────────────────────────
nalgebra = "0.33"
ndarray = "0.15"
statrs = "0.16"

# ── Web / WASM / Browser ─────────────────────────────────────────────────────
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console", "Window", "Document"] }
reqwest = { version = "0.12", features = ["json", "stream"] }

# ── Utilities & Quality ──────────────────────────────────────────────────────
rand = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1.0"
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
once_cell = "1.19"

# ── Internal Ra-Thor Crates (Path-Based, Mercy-Gated) ────────────────────────
ra-thor-mercy = { path = "crates/mercy" }
ra-thor-orchestration = { path = "crates/orchestration" }
ra-thor-ai-bridge = { path = "crates/ai-bridge" }
ra-thor-evolution = { path = "crates/evolution" }
ra-thor-quantum = { path = "crates/quantum" }
ra-thor-biomimetic = { path = "crates/biomimetic" }
ra-thor-common = { path = "crates/common" }
websiteforge = { path = "crates/websiteforge" }
aether-shades = { path = "crates/aether_shades" }
ra-thor-legal-lattice = { path = "crates/legal-lattice" }
ra-thor-plasticity-engine-v2 = { path = "crates/plasticity-engine-v2" }
ra-thor-quantum-swarm-orchestrator = { path = "crates/quantum-swarm-orchestrator" }
ra-thor-monorepo-intelligence = { path = "crates/monorepo-intelligence" }
ra-thor-mercy-radiation-shield = { path = "crates/mercy-radiation-shield" }
ra-thor-real-estate-lattice = { path = "crates/real-estate-lattice" }
ra-thor-benchmark = { path = "crates/ra-thor-benchmark" }
ra-thor-interstellar-operations = { path = "crates/interstellar-operations" }
powrush = { path = "crates/powrush" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1
