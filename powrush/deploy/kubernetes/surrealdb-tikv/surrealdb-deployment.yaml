apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: powrush-mmo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
      - name: surrealdb
        image: surrealdb/surrealdb:latest
        args:
          - start
          - --log-level=info
          - tikv://pd.powrush-mmo.svc.cluster.local:2379
        ports:
        - containerPort: 8000
        env:
        - name: SURREAL_PATH
          value: tikv://pd.powrush-mmo.svc.cluster.local:2379
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
