apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tikv
  namespace: powrush-mmo
spec:
  serviceName: tikv
  replicas: 3
  selector:
    matchLabels:
      app: tikv
  template:
    metadata:
      labels:
        app: tikv
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - tikv
              topologyKey: kubernetes.io/hostname
      containers:
      - name: tikv
        image: pingcap/tikv:latest
        args:
          - --addr=0.0.0.0:20160
          - --advertise-addr=$(POD_NAME).tikv.powrush-mmo.svc.cluster.local:20160
          - --data-dir=/data
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 20160
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
