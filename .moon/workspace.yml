# Moonrepo Workspace Configuration for Ra-Thor Monorepo
# v0.5.21 — Mercy-Gated • Quantum Swarm • Ethical AGI Infrastructure

projects:
  - 'crates/*'

vcs:
  manager: 'git'
  defaultBranch: 'main'

generator:
  templates:
    - 'templates'

runner:
  cache:
    lifetime: '14 days'
  logRunningCommand: true
  inheritColorsForPipes: true

# Ra-Thor specific tags for intelligent task routing
tags:
  - core
  - mercy
  - quantum
  - real-estate
  - governance
  - simulation
  - cryptography
  - post-quantum
