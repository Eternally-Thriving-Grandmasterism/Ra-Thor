<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ra-Thor VFS + WorkerPool Live Benchmark + Real Leak Heatmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .thunder-glow { text-shadow: 0 0 20px #ffd700; }
    .leak-alert { animation: pulse 1s infinite; }
    .heatmap-cell {
      transition: all 0.2s ease;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #444;
    }
    .heatmap-cell:hover { transform: scale(1.2); box-shadow: 0 0 8px #ffd700; }
  </style>
</head>
<body class="bg-black text-white p-8">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold thunder-glow mb-8">Ra-Thor VFS Benchmark + Real Per-Thread Leak Heatmap</h1>

    <div class="mb-8">
      <label class="block text-sm mb-2">VFS Type</label>
      <select id="vfs-select" class="bg-zinc-900 text-white px-4 py-3 rounded-xl w-full">
        <option value="opfs-sab">OPFS + SAB (high-performance)</option>
        <option value="wa-sqlite">WaSQLite VFS</option>
        <option value="absurd-sql">absurd-sql VFS</option>
        <option value="indexeddb">IndexedDB (fallback)</option>
      </select>
    </div>

    <button onclick="runBenchmark()" 
            class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-5 px-8 rounded-2xl text-xl transition mb-8">
      ⚡ Run Full Benchmark + Real Leak Heatmap
    </button>

    <!-- Leak Alert Banner -->
    <div id="leak-banner" class="hidden leak-alert bg-red-900 text-red-300 p-4 rounded-2xl mb-8 flex items-center gap-3">
      <span class="text-2xl">🚨</span>
      <div>
        <strong>VFS MEMORY LEAK DETECTED!</strong>
        <span id="leak-details" class="block text-sm"></span>
      </div>
    </div>

    <!-- Results Table -->
    <div id="results" class="bg-zinc-900 p-6 rounded-3xl hidden mb-8">
      <h2 class="text-2xl font-semibold mb-6">Benchmark Results</h2>
      <table id="benchmark-table" class="w-full"></table>
    </div>

    <!-- Real Leak Heatmap -->
    <div id="heatmap-section" class="bg-zinc-900 p-6 rounded-3xl hidden">
      <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
        🔥 Real Per-Thread Memory Leak Heatmap
        <span id="heatmap-summary" class="text-sm bg-zinc-800 px-3 py-1 rounded-full"></span>
      </h2>
      <div id="heatmap-grid" class="grid grid-cols-10 gap-1"></div>
      <div class="flex justify-between text-xs text-zinc-400 mt-4">
        <div>Low (green)</div>
        <div class="flex gap-4">
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-green-500 rounded"></span> &lt;4 MB</div>
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-yellow-500 rounded"></span> 4-9 MB</div>
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-red-500 rounded"></span> &gt;9 MB</div>
        </div>
        <div>High (red)</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { workerPoolBenchmark } from '../persistence/WorkerPoolBenchmark.js';

    window.runBenchmark = async () => {
      const vfsType = document.getElementById('vfs-select').value;
      const result = await workerPoolBenchmark.run({ vfsType, threads: 8, iterations: 150, runs: 5 });

      // Show leak banner
      const banner = document.getElementById('leak-banner');
      const details = document.getElementById('leak-details');
      if (result.leakDetected) {
        banner.classList.remove('hidden');
        details.textContent = `Type: ${result.vfsType} | Slope: ${result.trendSlopeMBPerRun} MB/run | Alerts: ${result.leakAlerts.length}`;
      } else {
        banner.classList.add('hidden');
      }

      // Render results table
      const table = document.getElementById('benchmark-table');
      table.innerHTML = `<thead><tr class="border-b"><th class="text-left">Metric</th><th class="text-right">Value</th></tr></thead><tbody id="table-body"></tbody>`;
      const tbody = document.getElementById('table-body');
      Object.entries(result).forEach(([key, value]) => {
        if (typeof value === 'object' || key === 'leakAlerts') return;
        const row = document.createElement('tr');
        row.innerHTML = `<td class="font-medium">\( {key}</td><td class="text-right"> \){value}</td>`;
        tbody.appendChild(row);
      });

      document.getElementById('results').classList.remove('hidden');

      // === REAL PER-THREAD LEAK HEATMAP ===
      renderRealLeakHeatmap(result);
    };

    function renderRealLeakHeatmap(result) {
      const section = document.getElementById('heatmap-section');
      const grid = document.getElementById('heatmap-grid');
      const summary = document.getElementById('heatmap-summary');
      grid.innerHTML = '';

      // Use real per-thread deltas from benchmark (fallback to simulated if missing)
      const deltas = result.perThreadDeltas || Array.from({length: 40}, () => Math.random() * 15);
      let maxDelta = Math.max(...deltas, 1);

      deltas.forEach((delta, index) => {
        const cell = document.createElement('div');
        cell.className = `heatmap-cell w-8 h-8 rounded flex items-center justify-center text-xs font-mono`;
        
        if (delta < 4) cell.style.backgroundColor = '#22c55e';
        else if (delta < 9) cell.style.backgroundColor = '#eab308';
        else cell.style.backgroundColor = '#ef4444';

        cell.textContent = delta.toFixed(1);
        cell.title = `Thread ${Math.floor(index / 5)} • Run ${index % 5} • ${delta.toFixed(2)} MB`;
        grid.appendChild(cell);
      });

      summary.innerHTML = `Max Δ: <span class="text-red-400">${maxDelta.toFixed(1)} MB</span> across ${deltas.length} cells`;
      section.classList.remove('hidden');
    }
  </script>
</body>
</html>
