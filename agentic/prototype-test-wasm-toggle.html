<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ra-Thor VFS + Persistence Layer Live Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .thunder-glow { text-shadow: 0 0 20px #ffd700; }
  </style>
</head>
<body class="bg-black text-white p-8">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold thunder-glow mb-8">Ra-Thor Unified VFS + Persistence Layer Live Test</h1>
    
    <!-- VFS Selector -->
    <div class="mb-8">
      <label class="block text-sm mb-2">Checkpointer Type</label>
      <select id="vfs-select" class="bg-zinc-900 text-white px-4 py-3 rounded-xl w-full">
        <option value="indexeddb">IndexedDB (default, instant)</option>
        <option value="absurd-sql">absurd-sql VFS</option>
        <option value="wa-sqlite">WaSQLite VFS</option>
        <option value="opfs-sab" selected>OPFS + SAB (high-performance)</option>
      </select>
    </div>

    <div class="flex gap-4 mb-8">
      <button onclick="runTest()" 
              class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 px-6 rounded-xl transition">
        🚀 Run Test with Selected VFS
      </button>
    </div>

    <div id="results" class="bg-zinc-900 p-6 rounded-2xl space-y-4 hidden">
      <h2 class="text-xl font-semibold">Live Test Results</h2>
      <pre id="output" class="bg-black p-4 rounded-xl text-sm overflow-auto max-h-96"></pre>
    </div>
  </div>

  <script type="module">
    import { runHybridAgenticSession } from '../hybrid/index.js';

    window.runTest = async () => {
      const selectedType = document.getElementById('vfs-select').value;
      const start = performance.now();
      
      const result = await runHybridAgenticSession(
        "Test unified VFS Persistence Layer",
        "en",
        {},
        selectedType
      );
      
      const duration = (performance.now() - start).toFixed(2);

      const output = document.getElementById('output');
      output.textContent = JSON.stringify({
        checkpointerUsed: result.checkpointerUsed,
        lumenasCI: result.lumenasCI || "N/A",
        responseSnippet: result.response?.slice(0, 120) + "...",
        durationMs: duration + " ms",
        success: !result.response?.includes("blocked")
      }, null, 2);

      document.getElementById('results').classList.remove('hidden');
    };
  </script>
</body>
</html>
