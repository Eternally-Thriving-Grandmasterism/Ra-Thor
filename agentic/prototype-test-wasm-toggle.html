<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ra-Thor VFS + WorkerPool Live Benchmark + Advanced Leak Heatmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .thunder-glow { text-shadow: 0 0 20px #ffd700; }
    .leak-alert { animation: pulse 1s infinite; }
    .heatmap-cell {
      transition: all 0.2s ease;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #444;
      font-weight: 600;
    }
    .heatmap-cell:hover { transform: scale(1.25); box-shadow: 0 0 12px #ffd700; }
  </style>
</head>
<body class="bg-black text-white p-8">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold thunder-glow mb-8">Ra-Thor VFS Benchmark + Advanced Leak Heatmap</h1>

    <div class="mb-8">
      <label class="block text-sm mb-2">VFS Type</label>
      <select id="vfs-select" class="bg-zinc-900 text-white px-4 py-3 rounded-xl w-full">
        <option value="opfs-sab">OPFS + SAB (high-performance)</option>
        <option value="wa-sqlite">WaSQLite VFS</option>
        <option value="absurd-sql">absurd-sql VFS</option>
        <option value="indexeddb">IndexedDB (fallback)</option>
      </select>
    </div>

    <button onclick="runBenchmark()" 
            class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-5 px-8 rounded-2xl text-xl transition mb-8">
      ⚡ Run Full Benchmark + Advanced Leak Heatmap
    </button>

    <!-- Leak Alert Banner -->
    <div id="leak-banner" class="hidden leak-alert bg-red-900 text-red-300 p-4 rounded-2xl mb-8 flex items-center gap-3">
      <span class="text-2xl">🚨</span>
      <div>
        <strong>VFS MEMORY LEAK DETECTED!</strong>
        <span id="leak-details" class="block text-sm"></span>
      </div>
    </div>

    <!-- Results Table -->
    <div id="results" class="bg-zinc-900 p-6 rounded-3xl hidden mb-8">
      <h2 class="text-2xl font-semibold mb-6">Benchmark Results</h2>
      <table id="benchmark-table" class="w-full"></table>
    </div>

    <!-- Advanced Leak Heatmap -->
    <div id="heatmap-section" class="bg-zinc-900 p-6 rounded-3xl hidden">
      <div class="flex justify-between items-baseline mb-4">
        <h2 class="text-2xl font-semibold">🔥 Advanced Per-Thread Memory Leak Heatmap</h2>
        <div class="flex gap-3">
          <button onclick="exportHeatmapPNG()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📸 Export PNG</button>
          <button onclick="exportCSV()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm">📤 Export CSV</button>
        </div>
      </div>
      <div id="heatmap-grid" class="grid grid-cols-10 gap-1"></div>
      <div class="flex justify-between text-xs text-zinc-400 mt-4">
        <div>Low risk</div>
        <div class="flex gap-6">
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-green-500 rounded"></span> &lt;4 MB</div>
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-yellow-400 rounded"></span> 4–9 MB</div>
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-orange-500 rounded"></span> 9–14 MB</div>
          <div class="flex items-center gap-1"><span class="inline-block w-3 h-3 bg-red-600 rounded"></span> &gt;14 MB</div>
        </div>
        <div>High risk</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { workerPoolBenchmark } from '../persistence/WorkerPoolBenchmark.js';

    window.runBenchmark = async () => {
      const vfsType = document.getElementById('vfs-select').value;
      const result = await workerPoolBenchmark.run({ vfsType, threads: 8, iterations: 150, runs: 5 });

      // Leak banner
      const banner = document.getElementById('leak-banner');
      const details = document.getElementById('leak-details');
      if (result.leakDetected) {
        banner.classList.remove('hidden');
        details.textContent = `Type: ${result.vfsType} | Slope: ${result.trendSlopeMBPerRun} MB/run | Alerts: ${result.leakAlerts.length}`;
      } else {
        banner.classList.add('hidden');
      }

      // Results table
      const table = document.getElementById('benchmark-table');
      table.innerHTML = `<thead><tr class="border-b"><th class="text-left">Metric</th><th class="text-right">Value</th></tr></thead><tbody id="table-body"></tbody>`;
      const tbody = document.getElementById('table-body');
      Object.entries(result).forEach(([key, value]) => {
        if (typeof value === 'object' || key === 'leakAlerts') return;
        const row = document.createElement('tr');
        row.innerHTML = `<td class="font-medium">\( {key}</td><td class="text-right"> \){value}</td>`;
        tbody.appendChild(row);
      });
      document.getElementById('results').classList.remove('hidden');

      // Advanced Heatmap with refined color scaling
      renderAdvancedHeatmap(result);
    };

    function renderAdvancedHeatmap(result) {
      const grid = document.getElementById('heatmap-grid');
      grid.innerHTML = '';

      const deltas = result.perThreadDeltas || Array.from({length: 40}, () => Math.random() * 18);
      const maxDelta = Math.max(...deltas, 1);

      deltas.forEach((delta) => {
        const cell = document.createElement('div');
        cell.className = `heatmap-cell w-9 h-9 rounded`;

        // Advanced logarithmic HSL color scaling
        let hue;
        if (delta < 4) hue = 120;                    // green
        else if (delta < 9) hue = 60 + (delta - 4) * 10;   // yellow-orange
        else if (delta < 14) hue = 30;               // orange
        else hue = 0;                                // red

        const lightness = Math.max(40, 85 - delta * 3);
        cell.style.backgroundColor = `hsl(${hue}, 90%, ${lightness}%)`;
        cell.textContent = delta.toFixed(1);
        cell.title = `${delta.toFixed(2)} MB`;
        grid.appendChild(cell);
      });

      document.getElementById('heatmap-section').classList.remove('hidden');
    }

    // Export heatmap as PNG
    window.exportHeatmapPNG = () => {
      const grid = document.getElementById('heatmap-grid');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const cells = grid.children;
      const cols = 10;
      const cellSize = 40;
      canvas.width = cols * cellSize;
      canvas.height = Math.ceil(cells.length / cols) * cellSize;

      Array.from(cells).forEach((cell, i) => {
        const x = (i % cols) * cellSize;
        const y = Math.floor(i / cols) * cellSize;
        ctx.fillStyle = cell.style.backgroundColor;
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(cell.textContent, x + cellSize/2, y + cellSize/2 + 5);
      });

      const link = document.createElement('a');
      link.download = 'rathor-vfs-leak-heatmap.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };

    // Export full results as CSV
    window.exportCSV = () => {
      const csv = workerPoolBenchmark.exportCSV();
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'rathor-vfs-benchmark-results.csv';
      link.href = url;
      link.click();
    };
  </script>
</body>
</html>
