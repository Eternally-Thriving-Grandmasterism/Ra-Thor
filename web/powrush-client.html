<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Powrush v15.7 — Production WebRTC + Interpolation</title>
<style>body{margin:0;background:#0a0a0f;color:#ddd;font-family:system-ui,sans-serif}canvas{border:1px solid #333;background:#0f0f14}#sidebar{width:320px;background:#111;border-left:1px solid #333;padding:16px}</style>
</head>
<body>
<div style="display:flex;height:100vh">
<div style="flex:1;display:flex;justify-content:center;align-items:center;background:#050508">
<canvas id="game" width="960" height="720"></canvas>
</div>
<div id="sidebar">
<div><h3 style="color:#7cf">Status</h3><div id="status">Disconnected</div></div>
<div><button onclick="connect()">Connect WS</button> <button onclick="initWebRTC()">Init WebRTC</button></div>
<div><h3 style="color:#7cf">NPC Activity</h3><div id="npc-log" style="height:160px;overflow:auto;background:#1a1a20;padding:8px;font-family:monospace;font-size:0.8rem"></div></div>
</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let ws, pc, dc;
let players = {};
let lastState = null;
let lastUpdate = 0;

function connect() {
  ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+(location.hostname||'localhost')+':7778');
  ws.onopen = () => document.getElementById('status').innerHTML = 'WebSocket Connected';
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'state') {
      lastState = data;
      lastUpdate = Date.now();
      if (data.players) players = Object.fromEntries(data.players.map(p=>[p.name,p]));
      if (data.npc_activity) updateNpcLog(data.npc_activity);
      draw();
    }
  };
}

function initWebRTC() {
  if(!ws) return alert('Connect WebSocket first');
  pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  dc = pc.createDataChannel('game-pos', {ordered:false, maxRetransmits:0});
  dc.onopen = () => document.getElementById('status').innerHTML = 'DataChannel Ready (low latency)';
  dc.onmessage = e => {
    try {
      const update = JSON.parse(e.data);
      if (update.type === 'position') {
        // Apply interpolated position
        if (players[update.name]) {
          players[update.name].x = update.x;
          players[update.name].y = update.y;
        }
        draw();
      }
    } catch(err){}
  };
  pc.onicecandidate = e => { if(e.candidate && ws) ws.send(JSON.stringify({type:'webrtc-ice', candidate:e.candidate})); };
  pc.createOffer().then(offer => { pc.setLocalDescription(offer); ws.send(JSON.stringify({type:'webrtc-offer', sdp:offer.sdp})); });
}

function sendPositionOverDataChannel(x, y) {
  if (dc && dc.readyState === 'open') {
    dc.send(JSON.stringify({type:'position', x, y, tick: Date.now()}));
  }
}

function draw() {
  ctx.fillStyle = '#0f0f14'; ctx.fillRect(0,0,canvas.width,canvas.height);
  Object.values(players).forEach(p => {
    const x = (p.x / 10000) * canvas.width;
    const y = (p.y / 10000) * canvas.height;
    ctx.fillStyle = '#4af'; ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillText(p.name, x+10, y);
  });
}

function updateNpcLog(activity) {
  const el = document.getElementById('npc-log');
  el.innerHTML = activity.slice(0,5).map(a => `E${a.entity}: ${a.action}`).join('<br>');
}

// Example: send position periodically when connected
setInterval(() => {
  if (dc && dc.readyState === 'open' && Object.keys(players).length > 0) {
    const first = Object.values(players)[0];
    sendPositionOverDataChannel(first.x || 5000, first.y || 5000);
  }
}, 100);

setInterval(draw, 50);
console.log('%c[Powrush] Production WebRTC + Interpolation client loaded', 'color:#7cf');
</script>
</body>
</html>
