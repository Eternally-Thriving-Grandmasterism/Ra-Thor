<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powrush v15.6 — Ra-Thor AGI Client (WebRTC Prototype)</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #ddd; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #header h1 { margin: 0; font-size: 1.4rem; color: #7cf; }
        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #050508; }
        #game-canvas { border: 1px solid #333; background: #0f0f14; }
        #sidebar { width: 320px; background: #111; border-left: 1px solid #333; padding: 16px; overflow-y: auto; font-size: 0.9rem; }
        .section { margin-bottom: 20px; }
        .section h3 { margin: 0 0 8px 0; color: #7cf; font-size: 1rem; }
        #status { font-family: monospace; background: #1a1a20; padding: 8px; border-radius: 4px; }
        #npc-log { background: #1a1a20; padding: 8px; border-radius: 4px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
        button { background: #2a4a6f; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #3a5a7f; }
        input { background: #222; border: 1px solid #444; color: #ddd; padding: 6px 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
        .webrtc-status { font-size: 0.8rem; color: #7f7; }
    </style>
</head>
<body>
    <div id="header">
        <h1>⚡ Powrush v15.6 — Ra-Thor AGI (WebRTC Prototype)</h1>
        <div>
            <button onclick="connectWebSocket()">Connect WS</button>
            <button onclick="initWebRTC()">Init WebRTC</button>
            <button onclick="disconnectAll()">Disconnect</button>
        </div>
    </div>

    <div style="display: flex; flex: 1; overflow: hidden;">
        <div id="canvas-container">
            <canvas id="game-canvas" width="900" height="700"></canvas>
        </div>

        <div id="sidebar">
            <div class="section">
                <h3>Status</h3>
                <div id="status">Disconnected</div>
                <div id="webrtc-status" class="webrtc-status">WebRTC: Not initialized</div>
            </div>

            <div class="section">
                <h3>Login</h3>
                <input type="text" id="name" placeholder="Name" value="Explorer">
                <input type="text" id="faction" placeholder="Faction" value="Harmony">
                <button onclick="sendLogin()">Login</button>
            </div>

            <div class="section">
                <h3>NPC Activity</h3>
                <div id="npc-log"></div>
            </div>

            <div class="section">
                <h3>WebRTC Controls (Prototype)</h3>
                <button onclick="sendTestPositionUpdate()">Send Test Position (DataChannel)</button>
                <div style="font-size: 0.75rem; color: #888; margin-top: 8px;">
                    This sends unreliable position data over WebRTC DataChannel (prototype).
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let ws = null;
        let pc = null;           // RTCPeerConnection
        let dataChannel = null;  // RTCDataChannel
        let players = {};
        let npcActivity = [];
        let currentTick = 0;

        // ==================== WebSocket (reliable channel) ====================
        function connectWebSocket() {
            if (ws) ws.close();
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            ws = new WebSocket(`${protocol}//${host}:7778`);

            ws.onopen = () => {
                document.getElementById('status').innerHTML = 'WebSocket Connected';
                document.getElementById('status').style.color = '#7cf';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'state') {
                        currentTick = data.tick;
                        if (data.players) updatePlayers(data.players);
                        if (data.npc_activity) {
                            npcActivity = data.npc_activity;
                            updateNpcLog();
                        }
                        draw();
                    }
                } catch (e) {}
            };

            ws.onclose = () => {
                document.getElementById('status').innerHTML = 'WebSocket Disconnected';
                document.getElementById('status').style.color = '#f66';
            };
        }

        function sendLogin() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Connect WebSocket first');
            const name = document.getElementById('name').value;
            const faction = document.getElementById('faction').value;
            ws.send(JSON.stringify({ cmd: 'LOGIN', name, faction }));
        }

        // ==================== WebRTC Prototype ====================
        async function initWebRTC() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return alert('Please connect WebSocket first (used for signaling)');
            }

            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            // Create DataChannel (unreliable for position updates)
            dataChannel = pc.createDataChannel('game-updates', {
                ordered: false,
                maxRetransmits: 0
            });

            dataChannel.onopen = () => {
                document.getElementById('webrtc-status').innerHTML = 'WebRTC DataChannel: Open (unreliable)';
                document.getElementById('webrtc-status').style.color = '#7f7';
            };

            dataChannel.onmessage = (event) => {
                // Handle incoming unreliable data from server (future)
                console.log('DataChannel message:', event.data);
            };

            // Handle incoming DataChannel from server (if server initiates)
            pc.ondatachannel = (event) => {
                const dc = event.channel;
                dc.onmessage = (e) => console.log('Received via server DataChannel:', e.data);
            };

            // ICE candidate handling (send via WebSocket signaling)
            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc-ice',
                        candidate: event.candidate
                    }));
                }
            };

            // Create offer and send via WebSocket (signaling)
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: 'webrtc-offer',
                sdp: offer.sdp
            }));

            document.getElementById('webrtc-status').innerHTML = 'WebRTC: Offer sent (waiting for answer)...';
        }

        function sendTestPositionUpdate() {
            if (!dataChannel || dataChannel.readyState !== 'open') {
                return alert('WebRTC DataChannel not ready. Click "Init WebRTC" first.');
            }

            // Example: Send unreliable position update
            const fakePosition = {
                type: 'position',
                x: Math.random() * 10000,
                y: Math.random() * 10000,
                tick: currentTick
            };

            dataChannel.send(JSON.stringify(fakePosition));
            console.log('Sent via DataChannel:', fakePosition);
        }

        function disconnectAll() {
            if (ws) { ws.close(); ws = null; }
            if (pc) { pc.close(); pc = null; }
            if (dataChannel) { dataChannel = null; }
            document.getElementById('status').innerHTML = 'Disconnected';
            document.getElementById('webrtc-status').innerHTML = 'WebRTC: Disconnected';
        }

        // ==================== Rendering ====================
        function updatePlayers(playerList) {
            players = {};
            playerList.forEach(p => { players[p.name] = p; });
        }

        function updateNpcLog() {
            const logEl = document.getElementById('npc-log');
            logEl.innerHTML = '';
            npcActivity.slice(0, 6).forEach(a => {
                const div = document.createElement('div');
                div.style.color = a.mercy > 0.85 ? '#7f7' : '#ff7';
                div.innerHTML = `E${a.entity}: ${a.action} (${a.mercy.toFixed(2)})`;
                logEl.appendChild(div);
            });
        }

        function draw() {
            ctx.fillStyle = '#0f0f14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple grid
            ctx.strokeStyle = '#222';
            for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            // Players
            Object.values(players).forEach(p => {
                const x = (p.x / 10000) * canvas.width;
                const y = (p.y / 10000) * canvas.height;
                ctx.fillStyle = '#4af';
                ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '12px monospace';
                ctx.fillText(p.name, x + 12, y + 4);
            });

            // NPC indicators (from activity)
            npcActivity.forEach((action, i) => {
                const x = 180 + (i % 8) * 85;
                const y = 120 + Math.floor(i / 8) * 110;
                ctx.fillStyle = '#f96';
                ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffcc88';
                ctx.font = '10px monospace';
                ctx.fillText(`NPC${action.entity}`, x - 18, y - 16);
            });

            ctx.fillStyle = '#888';
            ctx.font = '14px monospace';
            ctx.fillText(`Tick: ${currentTick}`, 20, 30);
        }

        setTimeout(() => {
            draw();
            document.getElementById('status').innerHTML = 'Ready — Connect WS then Init WebRTC';
        }, 200);

        console.log('%c[Powrush Client] v15.6 + WebRTC DataChannel prototype loaded', 'color:#7cf');
    </script>
</body>
</html>
