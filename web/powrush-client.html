<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powrush v15.6 — Ra-Thor AGI Client</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0f;
            color: #ddd;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            background: #111;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        #header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: #7cf;
        }
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050508;
            position: relative;
        }
        #game-canvas {
            border: 1px solid #333;
            background: #0f0f14;
            image-rendering: crisp-edges;
        }
        #sidebar {
            width: 320px;
            background: #111;
            border-left: 1px solid #333;
            padding: 16px;
            overflow-y: auto;
            font-size: 0.9rem;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h3 {
            margin: 0 0 8px 0;
            color: #7cf;
            font-size: 1rem;
        }
        #status {
            font-family: monospace;
            background: #1a1a20;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        #npc-log {
            background: #1a1a20;
            padding: 8px;
            border-radius: 4px;
            height: 220px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.3;
        }
        button {
            background: #2a4a6f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover {
            background: #3a5a7f;
        }
        input {
            background: #222;
            border: 1px solid #444;
            color: #ddd;
            padding: 6px 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>⚡ Powrush v15.6 — Ra-Thor AGI</h1>
        <div>
            <button onclick="connectWebSocket()">Connect</button>
            <button onclick="disconnectWebSocket()">Disconnect</button>
        </div>
    </div>

    <div style="display: flex; flex: 1; overflow: hidden;">
        <!-- Canvas -->
        <div id="canvas-container">
            <canvas id="game-canvas" width="900" height="700"></canvas>
        </div>

        <!-- Sidebar -->
        <div id="sidebar">
            <div class="section">
                <h3>Status</h3>
                <div id="status">Disconnected</div>
            </div>

            <div class="section">
                <h3>Login</h3>
                <input type="text" id="name" placeholder="Name" value="Explorer">
                <input type="text" id="faction" placeholder="Faction" value="Harmony">
                <button onclick="sendLogin()">Login</button>
            </div>

            <div class="section">
                <h3>NPC Activity (last 8)</h3>
                <div id="npc-log"></div>
            </div>

            <div class="section">
                <h3>Controls</h3>
                <div style="font-size: 0.8rem; color: #888;">
                    Click canvas to move (future)<br>
                    Type in terminal: move, harvest, diplomacy, npcs, quest
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let ws = null;
        let players = {};
        let npcs = {};
        let npcActivity = [];
        let currentTick = 0;

        function connectWebSocket() {
            if (ws) ws.close();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            ws = new WebSocket(`${protocol}//${host}:7778`);

            ws.onopen = () => {
                document.getElementById('status').innerHTML = 'Connected to Powrush Server';
                document.getElementById('status').style.color = '#7cf';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'state') {
                        currentTick = data.tick;
                        updatePlayers(data.players || []);
                        if (data.npc_activity) {
                            npcActivity = data.npc_activity;
                            updateNpcLog();
                        }
                        draw();
                    }

                    if (data.type === 'welcome') {
                        document.getElementById('status').innerHTML = data.msg;
                    }
                } catch (e) {
                    console.log('Message:', event.data);
                }
            };

            ws.onclose = () => {
                document.getElementById('status').innerHTML = 'Disconnected';
                document.getElementById('status').style.color = '#f66';
            };

            ws.onerror = (err) => {
                console.error('WebSocket error', err);
            };
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendLogin() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Not connected');
                return;
            }
            const name = document.getElementById('name').value || 'Explorer';
            const faction = document.getElementById('faction').value || 'Harmony';

            const msg = {
                cmd: 'LOGIN',
                name: name,
                faction: faction
            };
            ws.send(JSON.stringify(msg));
        }

        function updatePlayers(playerList) {
            players = {};
            playerList.forEach(p => {
                players[p.name] = p;
            });
        }

        function updateNpcLog() {
            const logEl = document.getElementById('npc-log');
            logEl.innerHTML = '';

            npcActivity.slice(0, 8).forEach(action => {
                const div = document.createElement('div');
                div.style.marginBottom = '4px';
                div.style.color = action.mercy > 0.85 ? '#7f7' : '#ff7';
                div.innerHTML = `E${action.entity} @${action.tick}: ${action.action} <span style="color:#888">(${action.mercy.toFixed(2)})</span>`;
                logEl.appendChild(div);
            });
        }

        function draw() {
            ctx.fillStyle = '#0f0f14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw players
            Object.values(players).forEach(p => {
                const x = (p.x / 10000) * canvas.width;
                const y = (p.y / 10000) * canvas.height;

                ctx.fillStyle = '#4af';
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '12px monospace';
                ctx.fillText(p.name, x + 12, y + 4);
            });

            // Draw NPCs (simulated positions for demo - in real would come from server)
            // For now we show activity indicators
            npcActivity.forEach((action, index) => {
                const x = 200 + (index * 80) % 600;
                const y = 150 + Math.floor(index / 6) * 120;

                ctx.fillStyle = '#f96';
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffcc88';
                ctx.font = '10px monospace';
                ctx.fillText(`NPC${action.entity}`, x - 15, y - 18);
            });

            // Tick info
            ctx.fillStyle = '#888';
            ctx.font = '14px monospace';
            ctx.fillText(`Tick: ${currentTick}`, 20, 30);
        }

        // Initial draw
        setTimeout(() => {
            draw();
            document.getElementById('status').innerHTML = 'Ready - Click Connect';
        }, 100);

        // Keyboard support for future commands
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                e.preventDefault();
                const cmd = prompt('Command:');
                if (cmd && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ cmd: cmd }));
                }
            }
        });

        console.log('%c[Powrush Client] v15.6 loaded. Connect to see Ra-Thor NPCs.', 'color:#7cf');
    </script>
</body>
</html>
