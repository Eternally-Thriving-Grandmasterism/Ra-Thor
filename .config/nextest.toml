[profile.default]
retries = 2
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
retries = 3
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 5 }
partition = "hash:{{ github.run_number }}"

[[profile.default.overrides]]
filter = 'package(mercy_*) or package(halo2_*) or package(futarchy_*) or test(integration)'
threads-required = 2

[[profile.ci.overrides]]
filter = 'package(lattice-conductor) or package(mercy-orchestrator_v2) or test(integration)'
retries = 1
