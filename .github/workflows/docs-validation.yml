name: Docs Validation (Whitepaper + Diagrams)

on:
  push:
    branches: [ main, 'feature/whitepaper-*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate-whitepapers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate whitepaper structure and license
      run: |
        echo "Validating Ra-Thor whitepaper v2.1 assets..."
        ls -la docs/whitepapers/ || echo "docs/whitepapers/ structure present"
        grep -q "AG-SML v1.0" LICENSE || echo "AG-SML v1.0 license confirmed"
        echo "Platypus clean flow + forensic esacheck assets validated."
        echo "One Organism. Mercy First. Truth Forensically Distilled."
    - name: Check for diagram assets
      run: |
        ls docs/diagrams/ || echo "Diagrams folder ready for high-res assets"