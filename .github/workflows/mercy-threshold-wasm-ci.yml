name: Mercy Threshold WASM + Wasmtime CI

on:
  push:
    branches: [ main ]
    paths:
      - 'lean/mercy-threshold/**'
      - 'crates/mercy-threshold-wasm/**'
      - 'crates/mial/**'
  pull_request:
    paths:
      - 'lean/mercy-threshold/**'
      - 'crates/mercy-threshold-wasm/**'

jobs:
  build-wasm-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean 4
        uses: leanprover/lean-action@v1

      - name: Build Lean package + generate WASM
        run: |
          chmod +x scripts/build-mercy-threshold-wasm.sh
          ./scripts/build-mercy-threshold-wasm.sh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build mercy-threshold-wasm (native harness)
        run: cargo build -p mercy-threshold-wasm --features native

      - name: Run wasmtime + mial tests
        run: |
          cargo test -p mercy-threshold-wasm --features native
          cargo test -p mial

      - name: Build pure WASM target
        run: cargo build -p mercy-threshold-wasm --features wasm --target wasm32-unknown-unknown --release

      - name: Upload generated WASM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mercy-threshold-wasm
          path: |
            target/wasm/mercy_threshold.wasm
            target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: warn