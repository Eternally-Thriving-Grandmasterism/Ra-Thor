name: CI — Ra-Thor Monorepo

on:
  push:
    branches: [ main, 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo nextest (97 crates)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (1.75+)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.75
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run full workspace tests with nextest
        run: |
          cargo nextest run \
            --workspace \
            --profile ci \
            --no-fail-fast \
            --junit target/nextest/ci/junit.xml

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          retention-days: 7

      - name: Run clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  shard-checks:
    name: Shard Profile Checks
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check full ONE Organism shard
        run: cargo run -p ra-thor-xtask -- check-shard --profile full

      - name: Check focused-real-estate shard
        run: cargo run -p ra-thor-xtask -- check-shard --profile focused-real-estate

      - name: Check focused-geometry shard
        run: cargo run -p ra-thor-xtask -- check-shard --profile focused-geometry
