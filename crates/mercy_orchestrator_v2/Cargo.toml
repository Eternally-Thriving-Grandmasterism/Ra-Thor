[package]
name = "mercy_orchestrator_v2"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Mercy Orchestrator v2 — Advanced unified lattice orchestration layer for Ra-Thor. The central mercy-gated coordination system between mercy engine, quantum swarm, kernel, and the full lattice."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy", "orchestrator", "lattice", "coordination", "agi", "patsagi"]
categories = ["simulation", "science"]

[dependencies]
# Core mercy layer
ra-thor-mercy = { workspace = true }

# Intelligence & swarm coordination
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-orchestration = { workspace = true }
ra-thor-evolution = { workspace = true }
ra-thor-plasticity-engine-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }

# Governance
patsagi-councils = { workspace = true }

# Async & runtime
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
futures = { workspace = true }

# Serialization & utilities
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
