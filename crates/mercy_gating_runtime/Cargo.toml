[package]
name = "mercy_gating_runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"], optional = true }
bincode = { version = "1.3", optional = true }

[features]
default = []
serde = ["dep:serde", "dep:bincode"]

[lib]
name = "mercy_gating_runtime"
path = "src/lib.rs"