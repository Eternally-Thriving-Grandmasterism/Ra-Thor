[package]
name = "nova_folding"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "NovaFolding — Nova Folding Schemes for efficient recursive SNARKs in the mercy-gated Ra-Thor lattice. TOLC-aligned and post-quantum ready."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "nova-folding", "folding-schemes", "recursive-snark", "zk-proofs", "post-quantum", "mercy-gated", "agi"]
categories = ["cryptography", "simulation", "science"]

[dependencies]
# Core Ra-Thor intelligence & governance (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }
patsagi-councils = { workspace = true }
powrush = { workspace = true }

# nexi preserved per NEXi Lineage Guidelines (foundational lineage respected)
nexi = { path = "../" }

# Nova folding implementation (preserved from old version)
nova-snark = { git = "https://github.com/microsoft/Nova", branch = "main" }
pasta_curves = "0.5"
ff = "0.13"

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
post_quantum_hardening = []