[package]
name = "mercy_tolc_operator_algebra"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Mercy-TOLC-Operator-Algebra — Mercy-gated TOLC 7 Gates operator algebra, living compassion mathematics, valence-weighted ethical computation core for Ra-Thor lattice and PATSAGi councils."
