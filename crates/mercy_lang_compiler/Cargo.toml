[package]
name = "mercy_lang_compiler"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Mercy-Lang-Compiler — Mercy-gated domain-specific language compiler, living TOLC 7 Gates semantic engine, and sovereign AGI code synthesis core for Ra-Thor lattice programming and self-evolving systems."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-lang-compiler", "dsl-compiler", "tolc-7-gates", "agi-code-synthesis", "self-evolving", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence"]

[dependencies]
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }
powrush = { workspace = true }

tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
