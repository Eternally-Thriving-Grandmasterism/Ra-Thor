[package]
name = "mercy_zero"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercyZero — Immutable Protective Gate Core for NEXi Lattice (Mercy Shield Foundation)"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-zero", "zero-point", "tolc-7-gates-anchor", "zero-decoherence", "foundational-mercy", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence"]

[dependencies]
# Core Ra-Thor dependencies (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-quantum = { workspace = true }
mercy_qec = { workspace = true }
powrush = { workspace = true }

# Dependencies from old public version
nexi = { path = "../" }

# Standard + extended tokio (full + extra features from old)
tokio = { workspace = true, features = ["full", "rt-multi-thread", "macros"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
post_quantum_hardening = []  # Future infinite gate strengthening
