[package]
name = "lattice-conductor-v14"
version = "14.2.0"
edition = "2021"

[dependencies]
nalgebra = { version = "0.33", features = ["serde-serialize"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
full-clifford = []
web-demo = ["tokio", "axum"]

[lib]
path = "src/lib.rs"