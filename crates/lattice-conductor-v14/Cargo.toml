[package]
name = "lattice-conductor-v14"
version = "14.8.2"
edition = "2021"
description = "Lattice Conductor v14.8.2 — CouncilArbitrationEngine + RuntimeSelfHealing (shared Cosmic Loop) + Distributed Mercy Mesh + restored healing surface (ONE Organism / TOLC 8)"
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <ceo@acitygames.com>"]

[dependencies]
nalgebra = { version = "0.33", features = ["serde-serialize"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
full-clifford = []
web-demo = ["tokio", "axum"]

[lib]
path = "src/lib.rs"
