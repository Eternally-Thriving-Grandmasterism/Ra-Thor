[package]
name = "lattice-conductor-v14"
version = "14.10.0"
edition = "2021"
description = "Lattice Conductor v14.10 — CouncilArbitration + RuntimeSelfHealing + optional v13-compat surface (quiet-hold migration)"
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <info@Rathor.ai>"]

[dependencies]
nalgebra = { version = "0.33", features = ["serde-serialize"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
full-clifford = []
web-demo = ["tokio", "axum"]
# Additive v13 trait surface for leaf-crate migration (see MIGRATION_v13_to_v14.md)
v13-compat = []

[lib]
path = "src/lib.rs"
