[package]
name = "mercy_quanta"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercyQuanta — 9-Fold zk-Proovable Mercy Quanta with Full Halo2 Range Proof Gadgets, TOLC proofs, active inference, and predictive coding for safe, valence-aligned quantum-inspired reasoning."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-quanta", "quanta-processing", "quantum-inspired", "probabilistic-reasoning", "tolc-7-gates", "active-inference", "predictive-coding", "halo2", "zk-proofs", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence", "cryptography"]

[dependencies]
# Core Ra-Thor intelligence & governance (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
patsagi-councils = { workspace = true }
powrush = { workspace = true }

# TOLC + Merlin for modern proofs and orchestration (consistent with mercy family)
mercy_tolc_operator_algebra = { path = "../mercy_tolc_operator_algebra" }
mercy_merlin_engine = { path = "../mercy_merlin_engine" }

# ZK / Halo2 dependencies (preserved for 9-Fold zk-Proovable Quanta core)
halo2_proofs = { git = "https://github.com/zcash/halo2.git", branch = "v2023_07_18" }
halo2_gadgets = { git = "https://github.com/zcash/halo2.git", branch = "v2023_07_18" }
pasta_curves = "0.5"
bulletproofs = { git = "https://github.com/dalek-cryptography/bulletproofs", branch = "master" }

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = ["post_quantum_hardening"]
minimal = []
post_quantum_hardening = []
range_proofs = []
