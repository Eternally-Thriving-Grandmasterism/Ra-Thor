[package]
name = "llama-cpp-gguf"
version = "0.1.0"
edition = "2021"
description = "Experimental: llama.cpp GGUF model loading for Rathor.ai self-evolution loops"
license = "AG-SML-1.0"

[dependencies]
llama-cpp-rs = "0.5"
tokio = { version = "1", features = ["rt", "macros"] }
serde_json = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }