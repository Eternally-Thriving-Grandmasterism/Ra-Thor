[package]
name = "wasm-ml-candle"
version = "0.1.0"
edition = "2021"
description = "Experimental: Candle compiled to WebAssembly for Rathor.ai self-evolution loops"
license = "AG-SML-1.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
candle-core = { version = "0.7", default-features = false, features = ["wasm"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
getrandom = { version = "0.2", features = ["js"] }

[features]
default = []
wasm = []