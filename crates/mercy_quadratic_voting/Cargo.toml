[package]
name = "mercy_quadratic_voting"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercyQuadraticVoting — Mercy-Gated Quadratic Voting, Democratic Decision-Making & Community Governance Lattice. Integrates TOLC proofs, active inference, and predictive coding for ethical, valence-aligned collective intelligence."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-quadratic-voting", "quadratic-voting", "community-governance", "tolc-proofs", "mercy-gated", "ethical-democracy"]
categories = ["science", "simulation", "artificial-intelligence", "governance"]

[dependencies]
# Core Ra-Thor intelligence & governance (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }
patsagi-councils = { workspace = true }
mercy_tolc_operator_algebra = { path = "../mercy_tolc_operator_algebra" }
mercy_merlin_engine = { path = "../mercy_merlin_engine" }
powrush = { workspace = true }

# nexi preserved per NEXi Lineage Guidelines
nexi = { path = "../" }

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = ["post_quantum_hardening"]
minimal = []
post_quantum_hardening = []