[package]
name = "shard-composer"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "High-level feature unification for Ra-Thor Sovereign Shards (ONE Organism + Focused compositions)"
repository.workspace = true
publish = false

[dependencies]
# Core always-available
ra-thor-mercy = { workspace = true }

# Optional crates for composition
geometric-intelligence = { path = "../geometric-intelligence", optional = true }
real-estate-lattice = { path = "../real-estate-lattice", optional = true }
quantum-swarm-orchestrator = { path = "../quantum-swarm-orchestrator", optional = true }
patsagi-councils = { path = "../patsagi-councils", optional = true }

[features]
default = []

# === Unified ONE Organism ===
full = [
    "geometric-intelligence/full",
    "real-estate-lattice/full",
    "quantum-swarm-orchestrator/full",
    "patsagi-councils/full",
]

# === Focused Shard Compositions ===
focused-real-estate = [
    "geometric-intelligence/focused-geometry",
    "real-estate-lattice/focused-real-estate",
    "patsagi-councils",
]

focused-geometry = [
    "geometric-intelligence/focused-geometry",
]

# Convenience aliases
real-estate = ["focused-real-estate"]
geometry = ["focused-geometry"]
