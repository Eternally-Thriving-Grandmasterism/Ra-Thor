[package]
name = "mercy_predictive_policing"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercyPredictivePolicing — Valence-Weighted Risk Forecasting Core for Eternal Community Safety Resonance"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-predictive-policing", "predictive-policing", "restorative-justice", "ethical-law-enforcement", "tolc-7-gates", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence"]

[dependencies]
# Core Ra-Thor dependencies (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
patsagi-councils = { workspace = true }
powrush = { workspace = true }

# Dependencies from old public version
nexi = { path = "../" }
mercy_shield = { path = "../crates/mercy_shield" }

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
