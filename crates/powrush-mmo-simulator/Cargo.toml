[package]
name = "powrush-mmo-simulator"
version = "0.3.8"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Powrush MMO Reality Simulator — Mercy-gated Resource-Based Economy simulation layer for Ra-Thor. Integrated with MIAL geometry mercy evaluation + hybrid Lean/Rust threshold bridge."
keywords = ["powrush", "rbe", "mmo", "simulation", "mercy", "economy", "geometry", "mial"]
categories = ["simulation", "game-development"]

[dependencies]
# Core Powrush engine
powrush = { path = "../powrush" }

# Mercy-gated Ra-Thor core
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-evolution = { workspace = true }
ra-thor-plasticity-engine-v2 = { workspace = true }

# MIAL + Mercy Threshold hybrid bridge (full mercy geometry evaluation)
mial = { path = "../mial" }
mercy-threshold-wasm = { path = "../mercy-threshold-wasm", features = ["native"] }

# Serialization & utilities
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
rand = { workspace = true }
tracing = { workspace = true }
nalgebra = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
