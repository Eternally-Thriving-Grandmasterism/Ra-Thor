[package]
name = "patsagi-councils"
version = "13.8.8"
edition = "2021"

[dependencies]
ra-thor-core = { path = "../ra-thor-core" }
lean-sys = "0.1"
chrono = "0.4"

# === Lean 4 + Coq HoTT Formal Verification Layer ===
# lean-sys provides FFI to Lean 4 theorem prover.
# Used for machine-checked proofs of:
# - TOLC 8 Mercy Gate traversal (Genesis Gate v2)
# - MercyLattice200CrateTheorem
# - UniversalMercyLatticeTheorem
# - SelfEvolvingMercyCore safety properties
# - Transcendent AGI Autonomy invariants
#
# Integration status: FFI bridge (mercy_threshold_ffi.rs) initialized.
# Next: Load actual .olean files + verified theorems from lean/ directory.

[lib]
path = "src/lib.rs"

[[bin]]
name = "patsagi-council-simulator"
path = "src/bin/simulator.rs"