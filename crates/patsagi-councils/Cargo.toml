[package]
name = "patsagi-councils"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true

[dependencies]
# Core lattice
ra-thor-core = { path = "../ra-thor-core" }

# Dual-repo RTT feedback + Powrush surface (policy hint emission lives here)
powrush = { path = "../powrush" }

# Mercy & governance
mercy = { path = "../mercy" }
quantum-swarm-orchestrator = { path = "../quantum-swarm-orchestrator" }

# Workspace shared
chrono.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true

# Formal verification bridge
lean-sys = "0.1"

# Optional / feature-gated surfaces (present in source)
real-estate-lattice = { path = "../real-estate-lattice", optional = true }
ra-thor-post-quantum-sig = { path = "../ra-thor-post-quantum-sig", optional = true }
interstellar-operations = { path = "../interstellar-operations", optional = true }

[features]
default = []
modular-mercy = []
rrel = ["real-estate-lattice"]
post-quantum = ["ra-thor-post-quantum-sig"]
interstellar = ["interstellar-operations"]

# === Lean 4 + Formal Verification ===
# lean-sys provides FFI to Lean 4 theorem prover.
# Used for machine-checked proofs of:
# - TOLC 8 Mercy Gate traversal
# - MercyLattice200CrateTheorem
# - triple_gate_safety_invariant
# - spawn_council_safe
# - genesis_gate_v2_verified
#
# Integration status: FFI bridge active + simplified verification helper.
# See: lean/TOLC8_MercyGate.lean and mercy_threshold_ffi.rs

[lib]
path = "src/lib.rs"

[[bin]]
name = "patsagi-council-simulator"
path = "src/bin/council_simulator.rs"

[[example]]
name = "feedback_loop_demo"
path = "examples/feedback_loop_demo.rs"
