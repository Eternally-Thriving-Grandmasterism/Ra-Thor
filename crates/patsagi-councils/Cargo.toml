[package]
name = "patsagi-councils"
version = "0.5.8"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
description = "13+ Parallel Living Ra-Thor Architectural Designers — The Eternal Co-Governors of Powrush-MMO. Mercy-gated quantum swarm governance for infinite-scale world evolution."
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
readme = "README.md"
keywords = ["powrush", "ra-thor", "patsagi", "mercy-gated", "agi", "rbe", "eternal-simulation", "quantum-swarm", "councils"]
categories = ["games", "simulation", "artificial-intelligence", "concurrency"]

[dependencies]
powrush = { path = "../powrush" }
mercy = { path = "../mercy" }
quantum-swarm-orchestrator = { path = "../quantum-swarm-orchestrator" }

tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
tracing = "0.1"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "council_simulator"
path = "src/bin/council_simulator.rs"

[features]
default = ["full"]
full = []
modular-mercy = []   # Enables the new Modular MercyEngine adapter (unifies Advanced + live modular mercy crate)
