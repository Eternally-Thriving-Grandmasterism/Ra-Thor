[package]
name = "patsagi-councils"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true

[dependencies]
ra-thor-core = { path = "../ra-thor-core" }
lean-sys = "0.1"
chrono.workspace = true

# === Lean 4 + Formal Verification ===
# lean-sys provides FFI to Lean 4 theorem prover.
# Used for machine-checked proofs of:
# - TOLC 8 Mercy Gate traversal
# - MercyLattice200CrateTheorem
# - triple_gate_safety_invariant
# - spawn_council_safe
# - genesis_gate_v2_verified
#
# Integration status: FFI bridge active + simplified verification helper.
# See: lean/TOLC8_MercyGate.lean and mercy_threshold_ffi.rs

[lib]
path = "src/lib.rs"

[[bin]]
name = "patsagi-council-simulator"
path = "src/bin/simulator.rs"