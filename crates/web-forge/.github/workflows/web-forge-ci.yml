name: web-forge CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-accessibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build web-forge
        run: cargo build --package web-forge

      - name: Run tests with reporting
        run: cargo test --package web-forge -- --quiet

      - name: Generate Orchestration Report (example)
        run: |
          # In a real setup this would run your orchestration and output JSON
          echo '{"success": true, "wcag_aa_score": 87.5, "attempts": 1}' > report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-forge-report
          path: report.json

      - name: Enforce Quality Gate
        run: |
          if [ -f report.json ]; then
            score=$(jq -r '.wcag_aa_score // 0' report.json)
            echo "WCAG AA Score: $score"
            if (( $(echo "$score < 75" | bc -l) )); then
              echo "::error title=Quality Gate Failed::WCAG AA score is below minimum threshold (75)"
              exit 1
            fi
          fi
          echo "✅ All quality gates passed"
