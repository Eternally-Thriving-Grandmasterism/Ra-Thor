name: web-forge CI Quality Gate

on:
  push:
    branches: [ main, feat/web-forge-initial ]
  pull_request:
    branches: [ main ]

jobs:
  accessibility-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --package web-forge

      - name: Run Orchestration + Generate Report
        run: |
          cargo run --example axum_observability_server -- --generate-report || true

      - name: Upload Orchestration Report
        uses: actions/upload-artifact@v4
        with:
          name: orchestration-report
          path: report.json

      - name: Check Quality Gate
        run: |
          # Example: Fail if WCAG AA score is below 75
          if [ -f report.json ]; then
            score=$(jq '.wcag_aa_score // 0' report.json)
            if (( $(echo "$score < 75" | bc -l) )); then
              echo "❌ WCAG AA score too low: $score"
              exit 1
            fi
          fi
          echo "✅ Quality gate passed"
