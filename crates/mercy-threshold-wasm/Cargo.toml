[package]
name = "mercy-threshold-wasm"
version = "14.15.0"
edition = "2021"
authors = ["Sherif Samy Botros <info@Rathor.ai>", "Eternally-Thriving-Grandmasterism"]
description = "WASM-portable Mercy Threshold enforcement bridge for Ra-Thor / MIAL. Hybrid Lean WASM path + native Rust mial path. Living Cosmic Tick + ONE Organism 14.15.0 readiness."
license = "AG-SML-1.0"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["mercy", "threshold", "lean", "wasm", "ra-thor", "one-organism"]
categories = ["wasm", "simulation"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasmtime = { version = "25.0", features = ["cranelift"], optional = true }
anyhow = { version = "1.0", optional = true }
serde = { version = "1.0", features = ["derive"] }
mial = { path = "../mial", optional = true }

[features]
default = ["native"]
native = ["dep:wasmtime", "dep:anyhow", "dep:mial"]
wasm = []

[dev-dependencies]
wasmtime = { version = "25.0", features = ["cranelift"] }
anyhow = "1.0"
