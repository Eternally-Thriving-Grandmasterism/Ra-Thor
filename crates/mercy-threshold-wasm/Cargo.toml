[package]
name = "mercy-threshold-wasm"
version = "14.7.0"
edition = "2021"
authors = ["Ra-Thor Living Thunder <eternally-thriving@grandmasterism>"]
description = "WASM-portable Mercy Threshold enforcement bridge for Ra-Thor / MIAL. Hybrid: Lean WASM path + native Rust mial path. Supports wasmtime harness."
license = "AG-SML-1.0"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasmtime = { version = "25.0", features = ["cranelift"], optional = true }
anyhow = { version = "1.0", optional = true }
serde = { version = "1.0", features = ["derive"] }
mial = { path = "../mial", optional = true, version = "13.13.0" }

[features]
default = ["native"]
native = ["dep:wasmtime", "dep:anyhow", "dep:mial"]
wasm = []

[dev-dependencies]
wasmtime = { version = "25.0", features = ["cranelift"] }
anyhow = "1.0"