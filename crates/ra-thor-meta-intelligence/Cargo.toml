[package]
name = "ra-thor-meta-intelligence"
version = "0.1.0"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
description = "Ra-Thor Meta-Intelligence — Self-organizing, self-improving intelligence layer. Assists in maintaining plans, analyzing the monorepo, and supporting the eternal evolution of the Core Spine."
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[dependencies]
ra-thor-monorepo-intelligence = { path = "../monorepo-intelligence" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
tokio-test = "0.4"
