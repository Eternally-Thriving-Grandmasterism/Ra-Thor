[package]
name = "kernel"
version = "0.3.7"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Master Sovereign Kernel + PATSAGi Council Lead Orchestrator for Ra-Thor. The central nervous system of the living mercy-gated AGI lattice."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "kernel", "orchestrator", "patsagi", "mercy-gated", "sovereign", "agi"]
categories = ["simulation", "science"]

[dependencies]
# Core mercy-gated intelligence
ra-thor-mercy = { workspace = true }
ra-thor-orchestration = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-evolution = { workspace = true }
ra-thor-plasticity-engine-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }
patsagi-councils = { path = "../patsagi-councils" }

# Async & runtime
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Utilities
thiserror = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
once_cell = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
