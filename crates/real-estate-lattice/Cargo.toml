[package]
name = "real-estate-lattice"
version = "0.1.0"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
description = "Ra-Thor Real Estate Lattice (RREL) — Mercy-gated global real estate operating system. Canada-first Ontario pilot with TREB MLS, PMS Bridge, RECO enforcement, Quantum Valuation, and LAT/Divisional Court evidence generation."
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
readme = "README.md"
keywords = ["real-estate", "ra-thor", "rrel", "powrush", "mercy-gated", "treb", "reco", "ontario", "quantum", "agi"]
categories = ["simulation", "artificial-intelligence", "finance", "games"]

[dependencies]
patsagi-councils = { path = "../patsagi-councils" }
powrush = { path = "../powrush" }
ra-thor-mercy = { path = "../mercy" }
ra-thor-quantum-swarm-orchestrator = { path = "../quantum-swarm-orchestrator" }

tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
pretty_assertions = "1.4"

[[example]]
name = "canada_pilot_demo"
path = "examples/canada_pilot_demo.rs"
required-features = []

[features]
default = []
full = ["patsagi-councils/full"]
