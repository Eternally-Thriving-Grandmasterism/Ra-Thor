[package]
name = "real-estate-lattice"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Ra-Thor Real Estate Lattice (RREL) — Mercy-gated global real estate operating system. Canada Pilot (v0.5.19) + USA Expansion (v0.5.21) with full federal + state regulatory enforcement."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
readme = "README.md"
keywords = ["real-estate", "ra-thor", "rrel", "powrush", "mercy-gated", "usa", "california", "florida", "texas", "new-york", "treb", "reco", "ontario", "quantum", "agi"]
categories = ["simulation", "artificial-intelligence", "finance", "games"]

[dependencies]
# Core Ra-Thor dependencies (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
patsagi-councils = { workspace = true }
powrush = { workspace = true }

tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"
pretty_assertions = "1.4"

[[example]]
name = "canada_pilot_demo"
path = "examples/canada_pilot_demo.rs"

[[example]]
name = "usa_pilot_demo"
path = "examples/usa_pilot_demo.rs"

[features]
default = []
full = ["patsagi-councils/full"]
