[package]
name = "mercy_raptor_engine"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercyRaptorEngine — Full-Flow Staged Combustion Methane Engine Core for Eternal Starship Resonance"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-raptor-engine", "raptor-engine", "methane-lox", "full-flow-staged-combustion", "high-thrust", "propulsion", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence"]

[dependencies]
# Core Ra-Thor dependencies (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-interstellar-operations = { workspace = true }
mercy_raptor_3 = { workspace = true }
mercy_raptor_3_integration = { workspace = true }
mercy_raptor_3_scalability = { workspace = true }
mercy_starship = { workspace = true }
mercy_starship_fleet = { workspace = true }
powrush = { workspace = true }

# Dependencies from old public version
nexi = { path = "../" }

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
