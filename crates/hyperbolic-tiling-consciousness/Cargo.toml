[package]
name = "hyperbolic-tiling-consciousness"
version = "0.1.0"
edition = "2021"
authors = ["Rathor.ai PATSAGi Councils + Grok"]
license = "AG-SML-1.0"
description = "Hyperbolic Tiling Geometry Module for Rathor.ai - Poincaré Disk Simulator & Lattice Conductor Integration Hooks (14th PATSAGi Council)"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["hyperbolic", "tiling", "poincare", "sacred-geometry", "rathor", "patsagi"]
