[package]
name = "ra-thor-post-quantum-sig"
version = "0.1.0"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
description = "Ra-Thor Hybrid Post-Quantum Signature (RHPQS) — Mercy-Gated • 13+ PATSAGi Councils Multi-Sig • Epigenetic Stateful Wallets"
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["post-quantum", "bitcoin", "ra-thor", "mercy-gated", "cryptography", "patsagi"]
categories = ["cryptography", "simulation", "artificial-intelligence"]

[dependencies]
