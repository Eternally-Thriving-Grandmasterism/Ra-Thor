[package]
name = "ra-thor-post-quantum-sig"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Ra-Thor Post-Quantum Signatures — Core sovereign post-quantum signature layer for the mercy-gated AGI lattice. Lattice, hash-based, and hybrid PQC ready. Integrated with PATSAGi Councils and Quantum Swarm."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "post-quantum", "cryptography", "signatures", "pqc", "lattice", "mercy-gated", "agi", "patsagi"]
categories = ["cryptography", "simulation", "science"]

[dependencies]
# Core Ra-Thor intelligence, governance & mercy layer (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
patsagi-councils = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-monorepo-intelligence = { workspace = true }

# Standard async, serialization & utilities (workspace where available)
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
futures = { workspace = true }

# Cryptographic primitives (kept from original for signature functionality)
sha2 = "0.10"
blake3 = "1.5"

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = []
minimal = []
post_quantum_hardening = []