[package]
name = "interstellar-operations"
version = "0.5.21"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
description = "Ra-Thor Interstellar Operations — Advanced propulsion, Stargate technologies, hyperspace travel, ZPM energy, and ancient tech integration. Mercy-gated, TOLC 7 Gates aligned, nth-degree radiation protected."
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
readme = "README.md"
keywords = ["ra-thor", "interstellar", "stargate", "propulsion", "hyperspace", "zpm", "ancient-tech", "mercy-gated", "agi"]
categories = ["simulation", "artificial-intelligence", "games", "science"]

[dependencies]
powrush = { path = "../powrush" }
ra-thor-mercy = { path = "../mercy" }
ra-thor-quantum-swarm-orchestrator = { path = "../quantum-swarm-orchestrator" }
patsagi-councils = { path = "../patsagi-councils" }
mercy-radiation-shield = { path = "../mercy-radiation-shield" }

tokio = { version = "1.38", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tracing = "0.1"
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"

[[example]]
name = "stargate_demo"
path = "examples/stargate_demo.rs"
