[package]
name = "interstellar-operations"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "Ra-Thor Interstellar Operations — Advanced propulsion, Stargate technologies, hyperspace travel, ZPM energy, and ancient tech integration. Mercy-gated, TOLC 7 Gates aligned, nth-degree radiation protected."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
readme = "README.md"
keywords = ["ra-thor", "interstellar", "stargate", "propulsion", "hyperspace", "zpm", "ancient-tech", "mercy-gated", "agi"]
categories = ["simulation", "artificial-intelligence", "games", "science"]

[dependencies]
# Core Ra-Thor dependencies (workspace style for consistency)
powrush = { workspace = true }
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
mercy-radiation-shield = { workspace = true }
patsagi-councils = { workspace = true }

tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[[example]]
name = "stargate_demo"
path = "examples/stargate_demo.rs"

[features]
default = ["full"]
full = []
minimal = []
