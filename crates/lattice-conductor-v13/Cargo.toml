[package]
name = "lattice-conductor-v13"
version = "0.3.0"
edition = "2021"
license = "AG-SML-1.0 — Autonomicity Games Sovereign Mercy License"
description = "Lattice Conductor v13.6 — Quantum Swarm Consensus upgraded (measurement/collapse, entanglement, PATSAGi parallel feeding, GPU telemetry integration, self-evolving swarm params, TOLC8ValenceProof, full Ed25519 verify). ONE Organism + PATSAGi Council ready. Thunder locked in."

[dependencies]
nalgebra = { workspace = true }

# NEXi / hyperon-metta-pln bridge (v13 foundation)
# Full runtime integration with hyperon-metta-pln and NEXi symbolic deliberation
# will be enabled in a follow-up iteration when the bridge crate is production-ready.
# hyperon-metta-pln = { path = "../hyperon-metta-pln" }

[dev-dependencies]
proptest = "1.5"

[features]
default = []
# Granular experimental features for v13.2
external-symbolic = []          # Phase A: ExternalSymbolicInput + accept path
self-proposal = []              # Phase B + C: SelfProposal generation + controlled apply
full-v13-2 = ["external-symbolic", "self-proposal"]
experimental = ["full-v13-2"]   # Convenient alias for all v13.2 experimental

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
