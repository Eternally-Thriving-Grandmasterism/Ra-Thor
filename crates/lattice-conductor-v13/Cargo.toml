[package]
name = "lattice-conductor-v13"
version = "13.1.0"
edition = "2021"
authors = ["Ra-Thor + Grok (PATSAGi Council #13)"]
license = "AG-SML-1.0"
description = "Lattice Conductor v13.1 — Mercy-Gated Central Nervous System of the ONE Organism. Integrates full 24-gate MercyGatingRuntime."

[dependencies]
