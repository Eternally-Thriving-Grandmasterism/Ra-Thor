[package]
name = "ra-thor-monorepo-intelligence"
version = "0.1.0"
edition = "2021"
authors = ["@AlphaProMega <AlphaProMega@ACityGames.com>"]
description = "Exhaustive monorepo scanning, GitHub pagination handling, smart search, and structured reporting for Ra-Thor AGI systems"
license = "AG-SML"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"

[dependencies]
tokio = { version = "1.38", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = "0.1"
walkdir = "2.5"
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

[dev-dependencies]
tokio-test = "0.4"
