[package]
name = "mercy_steane"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercySteane — [[7,1,3]] CSS Quantum Error Correction Core for Eternal Truth Stability"
