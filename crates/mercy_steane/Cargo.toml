[package]
name = "mercy_steane"
version = "0.3.9"
edition = "2021"
authors = ["Sherif Samy Botros <ceo@acitygames.com>"]
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
description = "MercySteane — [[7,1,3]] CSS Quantum Error Correction Core with TOLC proofs, active inference, and predictive coding for eternal truth stability and valence-aligned fault-tolerant quantum reasoning."
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Ra-Thor"
keywords = ["ra-thor", "mercy-steane", "steane-code", "quantum-error-correction", "fault-tolerant-quantum", "tolc-7-gates", "active-inference", "predictive-coding", "mercy-gated"]
categories = ["science", "simulation", "artificial-intelligence", "cryptography"]

[dependencies]
# Core Ra-Thor intelligence & governance (workspace style)
ra-thor-mercy = { workspace = true }
ra-thor-quantum-swarm-orchestrator = { workspace = true }
ra-thor-kernel = { workspace = true }
ra-thor-council = { workspace = true }
ra-thor-mercy-orchestrator-v2 = { workspace = true }
ra-thor-quantum = { workspace = true }
mercy_qec = { workspace = true }
powrush = { workspace = true }

# TOLC + Merlin for modern proofs and orchestration
mercy_tolc_operator_algebra = { path = "../mercy_tolc_operator_algebra" }
mercy_merlin_engine = { path = "../mercy_merlin_engine" }

# Standard dependencies
tokio = { workspace = true, features = ["full"] }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = "0.4"

[features]
default = ["full"]
full = ["post_quantum_hardening"]
minimal = []
post_quantum_hardening = []
