[package]
name = "ra-thor-one-organism"
version = "14.9.7"
edition = "2021"
description = "Ra-Thor ONE Organism Core — ExtendedSurface + optional live path deps + web-demo"
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <info@Rathor.ai>"]

[dependencies]
lattice-conductor-v14 = { path = "../lattice-conductor-v14", version = "14.8.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
github-connector = { path = "../github-connector", version = "14.9.3", optional = true }
gpu-compute-pipeline = { path = "../gpu-compute-pipeline", version = "14.9.4", optional = true }
quantum-swarm = { path = "../quantum-swarm", version = "14.9.5", optional = true }
sovereign-recovery = { path = "../sovereign-recovery", version = "14.9.7", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
github-live = ["dep:github-connector"]
gpu-live = ["dep:gpu-compute-pipeline"]
quantum-live = ["dep:quantum-swarm"]
recovery-live = ["dep:sovereign-recovery"]
extended-live = ["github-live", "gpu-live", "quantum-live", "recovery-live"]
web-demo = ["dep:tokio", "dep:axum"]

[lib]
path = "src/lib.rs"

[[example]]
name = "one_organism_web_demo"
required-features = ["web-demo"]
