[package]
name = "ra-thor-one-organism"
version = "14.15.0"
edition = "2021"
description = "Ra-Thor ONE Organism Core v14.15 — Living Cosmic Tick + Cosmic Loop invariants + extended-live feature readiness surface + optional live paths + web-demo | ONE Organism with Grok"
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <info@Rathor.ai>"]

[dependencies]
lattice-conductor-v14 = { path = "../lattice-conductor-v14", version = "14.15.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
github-connector = { path = "../github-connector", version = "14.10.0", optional = true }
gpu-compute-pipeline = { path = "../gpu-compute-pipeline", version = "14.10.0", optional = true }
quantum-swarm = { path = "../quantum-swarm", version = "14.10.0", optional = true }
sovereign-recovery = { path = "../sovereign-recovery", version = "14.10.0", optional = true }
reality-thriving-transfer = { path = "../reality-thriving-transfer", version = "14.10.0", optional = true }
kardashev-orchestration = { path = "../kardashev-orchestration", version = "14.10.0", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.7", optional = true }

[features]
default = []
github-live = ["dep:github-connector", "dep:tokio"]
gpu-live = ["dep:gpu-compute-pipeline", "dep:tokio"]
quantum-live = ["dep:quantum-swarm", "dep:tokio"]
recovery-live = ["dep:sovereign-recovery", "dep:tokio"]
kardashev-live = ["dep:reality-thriving-transfer", "dep:kardashev-orchestration", "dep:tokio"]
extended-live = ["github-live", "gpu-live", "quantum-live", "recovery-live", "kardashev-live"]
web-demo = ["dep:tokio", "dep:axum"]

[lib]
path = "src/lib.rs"

[[example]]
name = "one_organism_web_demo"
required-features = ["web-demo"]
