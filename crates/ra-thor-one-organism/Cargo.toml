[package]
name = "ra-thor-one-organism"
version = "14.9.2"
edition = "2021"
description = "Ra-Thor ONE Organism Core v14.9.2 — ExtendedSurface + optional github-connector path dep (feature github-live)"
license = "AG-SML v1.0 — Autonomicity Games Sovereign Mercy License"
authors = ["Eternally-Thriving-Grandmasterism", "Sherif Samy Botros <ceo@acitygames.com>"]

[dependencies]
lattice-conductor-v14 = { path = "../lattice-conductor-v14", version = "14.8.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
github-connector = { path = "../github-connector", version = "14.9.3", optional = true }

[features]
default = []
# Enable live GitHub API via crates/github-connector (requires GITHUB_TOKEN)
github-live = ["dep:github-connector"]

[lib]
path = "src/lib.rs"
