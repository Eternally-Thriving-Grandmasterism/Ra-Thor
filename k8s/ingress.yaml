apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: powrush-ingress
  namespace: powrush-mmo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: powrush.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: powrush-service
            port:
              number: 8080